<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dead Angle</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #1a1a2e;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: "Press Start 2P", monospace;
        overflow: hidden;
      }

      canvas {
        display: none;
      }

      #gameContainer {
        position: relative;
        width: 1200px;
        height: 700px;
        background: #2a2a3e;
        border: 3px solid #0f3460;
        border-radius: 8px;
        overflow: hidden;
      }

      /* ==================== SCREENS ==================== */
      .screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }
      .screen.active {
        display: flex;
      }

      /* Main Menu */
      #mainMenu {
        background: linear-gradient(
          180deg,
          #0f3460 0%,
          #16213e 50%,
          #1a1a2e 100%
        );
      }
      #mainMenu h1 {
        color: #e94560;
        font-size: 48px;
        text-shadow:
          4px 4px 0 #0a0a1a,
          -1px -1px 0 #ff6b6b;
        margin-bottom: 10px;
        letter-spacing: 4px;
      }
      #mainMenu .subtitle {
        color: #c4a35a;
        font-size: 12px;
        margin-bottom: 60px;
        letter-spacing: 2px;
      }

      .menu-btn {
        background: linear-gradient(180deg, #1a6b4a 0%, #0f3460 100%);
        border: 2px solid #c4a35a;
        color: #f0e68c;
        font-family: "Press Start 2P", monospace;
        font-size: 16px;
        padding: 16px 48px;
        margin: 8px;
        cursor: pointer;
        border-radius: 4px;
        transition: all 0.15s;
        min-width: 300px;
        text-align: center;
      }
      .menu-btn:hover {
        background: linear-gradient(180deg, #c4a35a 0%, #8b7332 100%);
        color: #1a1a2e;
        transform: scale(1.05);
      }
      .menu-btn:active {
        transform: scale(0.97);
      }

      /* Difficulty Screen */
      #difficultyScreen {
        background: linear-gradient(180deg, #0f3460 0%, #16213e 100%);
      }
      #difficultyScreen h2 {
        color: #f0e68c;
        font-size: 28px;
        margin-bottom: 50px;
      }
      .diff-btn {
        min-width: 350px;
      }
      .diff-btn.easy {
        border-color: #4ecdc4;
      }
      .diff-btn.easy:hover {
        background: linear-gradient(180deg, #4ecdc4 0%, #2d8b84 100%);
      }
      .diff-btn.medium {
        border-color: #f0e68c;
      }
      .diff-btn.medium:hover {
        background: linear-gradient(180deg, #f0e68c 0%, #8b7332 100%);
      }
      .diff-btn.hard {
        border-color: #e94560;
      }
      .diff-btn.hard:hover {
        background: linear-gradient(180deg, #e94560 0%, #8b1a2e 100%);
      }

      /* Tutorial Prompt */
      #tutorialPrompt {
        background: linear-gradient(180deg, #0f3460 0%, #16213e 100%);
      }
      #tutorialPrompt h2 {
        color: #f0e68c;
        font-size: 22px;
        margin-bottom: 40px;
        text-align: center;
        line-height: 1.8;
      }
      .prompt-buttons {
        display: flex;
        gap: 20px;
      }

      /* Tutorial overlay (in-game) */
      .tutorial-overlay-msg {
        /* styled via canvas */
      }

      /* Settings Screen */
      .settings-screen {
        background: linear-gradient(180deg, #0f3460 0%, #16213e 100%);
      }
      .settings-screen h2 {
        color: #f0e68c;
        font-size: 24px;
        margin-bottom: 40px;
      }
      .setting-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 500px;
        margin: 12px 0;
        color: #a0c4e8;
        font-size: 12px;
      }
      .setting-row label {
        flex: 1;
      }
      .slider-container {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      input[type="range"] {
        -webkit-appearance: none;
        width: 150px;
        height: 8px;
        background: #16213e;
        border: 1px solid #0f3460;
        border-radius: 4px;
        outline: none;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        background: #c4a35a;
        border-radius: 50%;
        cursor: pointer;
      }
      .slider-value {
        color: #f0e68c;
        min-width: 40px;
        text-align: right;
      }

      /* Pause Screen */
      #pauseScreen {
        background: rgba(10, 10, 26, 0.85);
      }
      #pauseScreen h2 {
        color: #f0e68c;
        font-size: 32px;
        margin-bottom: 40px;
      }

      /* Confirm Leave */
      #confirmLeave {
        background: rgba(10, 10, 26, 0.9);
      }
      #confirmLeave h2 {
        color: #e94560;
        font-size: 20px;
        margin-bottom: 10px;
      }
      #confirmLeave p {
        color: #a0c4e8;
        font-size: 11px;
        margin-bottom: 30px;
      }

      /* Difficulty Change Warning */
      #diffChangeWarning {
        background: rgba(10, 10, 26, 0.9);
      }
      #diffChangeWarning h2 {
        color: #e94560;
        font-size: 18px;
        margin-bottom: 10px;
        text-align: center;
        line-height: 1.6;
      }
      #diffChangeWarning p {
        color: #a0c4e8;
        font-size: 11px;
        margin-bottom: 30px;
        text-align: center;
      }

      /* Game Over */
      #gameOverScreen {
        background: rgba(10, 10, 26, 0.92);
      }
      #gameOverScreen h2 {
        color: #e94560;
        font-size: 42px;
        margin-bottom: 20px;
        text-shadow: 3px 3px 0 #5a0a1a;
      }
      .go-stats {
        color: #a0c4e8;
        font-size: 14px;
        margin: 8px 0;
      }
      .go-stats span {
        color: #f0e68c;
      }
      #gameOverScreen .menu-btn {
        margin-top: 30px;
      }

      /* ==================== GAMEPLAY HUD ==================== */
      #gameCanvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* Cowboy silhouette decoration on main menu */
      .cowboy-deco {
        position: absolute;
        bottom: 40px;
        right: 60px;
        font-size: 80px;
        opacity: 0.15;
        color: #c4a35a;
      }

      /* Back button */
      .back-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        background: none;
        border: 1px solid #c4a35a44;
        color: #c4a35a;
        font-family: "Press Start 2P", monospace;
        font-size: 10px;
        padding: 8px 16px;
        cursor: pointer;
        border-radius: 3px;
      }
      .back-btn:hover {
        border-color: #c4a35a;
        background: #c4a35a22;
      }

      /* Warning colors */
      .warn-btn {
        border-color: #e94560;
      }
      .warn-btn:hover {
        background: linear-gradient(180deg, #e94560 0%, #8b1a2e 100%);
        color: #fff;
      }
      .safe-btn {
        border-color: #4ecdc4;
      }
      .safe-btn:hover {
        background: linear-gradient(180deg, #4ecdc4 0%, #2d8b84 100%);
        color: #1a1a2e;
      }
    </style>
  </head>
  <body>
    <div id="gameContainer">
      <!-- Canvas for gameplay -->
      <canvas id="gameCanvas" width="1200" height="700" tabindex="0"></canvas>

      <!-- Screen 1: Main Menu -->
      <div id="mainMenu" class="screen active">
        <h1>DEAD ANGLE</h1>
        <p class="subtitle">A COWBOY RICOCHET SHOOTER</p>
        <button class="menu-btn" onclick="showScreen('difficultyScreen')">
          PLAY
        </button>
        <button class="menu-btn" onclick="showScreen('settingsMain')">
          SETTINGS
        </button>
        <div class="cowboy-deco">&#x1F920;</div>
      </div>

      <!-- Screen 2: Difficulty Select -->
      <div id="difficultyScreen" class="screen">
        <button class="back-btn" onclick="showScreen('mainMenu')">
          &lt; BACK
        </button>
        <h2>CHOOSE DIFFICULTY</h2>
        <button class="menu-btn diff-btn easy" onclick="setDifficulty('easy')">
          EASY
        </button>
        <button
          class="menu-btn diff-btn medium"
          onclick="setDifficulty('medium')"
        >
          MEDIUM
        </button>
        <button class="menu-btn diff-btn hard" onclick="setDifficulty('hard')">
          HARD
        </button>
      </div>

      <!-- Screen 3: Tutorial Prompt -->
      <div id="tutorialPrompt" class="screen">
        <h2>DO YOU WANT TO<br />PLAY THE TUTORIAL?</h2>
        <div class="prompt-buttons">
          <button
            class="menu-btn safe-btn"
            onclick="startTutorial()"
          >
            YES
          </button>
          <button class="menu-btn" onclick="startGame()">NO, START GAME</button>
        </div>
      </div>

      <!-- Screen 7: Settings (Main Menu) -->
      <div id="settingsMain" class="screen settings-screen">
        <button class="back-btn" onclick="showScreen('mainMenu')">
          &lt; BACK
        </button>
        <h2>SETTINGS</h2>
        <div class="setting-row">
          <label>SFX VOLUME</label>
          <div class="slider-container">
            <input
              type="range"
              min="0"
              max="100"
              value="70"
              id="sfxVolumeMain"
              oninput="updateSetting('sfx', this.value)"
            />
            <span class="slider-value" id="sfxValMain">70</span>
          </div>
        </div>
        <div class="setting-row">
          <label>MUSIC VOLUME</label>
          <div class="slider-container">
            <input
              type="range"
              min="0"
              max="100"
              value="50"
              id="musicVolumeMain"
              oninput="updateSetting('music', this.value)"
            />
            <span class="slider-value" id="musicValMain">50</span>
          </div>
        </div>
        <div class="setting-row">
          <label>DIFFICULTY</label>
          <div class="slider-container">
            <button
              class="menu-btn"
              style="padding: 8px 16px; min-width: auto; font-size: 10px"
              id="diffDisplayMain"
              onclick="cycleDifficulty()"
            >
              MEDIUM
            </button>
          </div>
        </div>
      </div>

      <!-- Screen 8: Settings (In-Game) -->
      <div id="settingsGame" class="screen settings-screen">
        <h2>SETTINGS</h2>
        <div class="setting-row">
          <label>SFX VOLUME</label>
          <div class="slider-container">
            <input
              type="range"
              min="0"
              max="100"
              value="70"
              id="sfxVolumeGame"
              oninput="updateSetting('sfx', this.value)"
            />
            <span class="slider-value" id="sfxValGame">70</span>
          </div>
        </div>
        <div class="setting-row">
          <label>MUSIC VOLUME</label>
          <div class="slider-container">
            <input
              type="range"
              min="0"
              max="100"
              value="50"
              id="musicVolumeGame"
              oninput="updateSetting('music', this.value)"
            />
            <span class="slider-value" id="musicValGame">50</span>
          </div>
        </div>
        <div class="setting-row">
          <label>DIFFICULTY</label>
          <div class="slider-container">
            <button
              class="menu-btn"
              style="padding: 8px 16px; min-width: auto; font-size: 10px"
              id="diffDisplayGame"
              onclick="tryChangeDifficulty()"
            >
              MEDIUM
            </button>
          </div>
        </div>
        <button
          class="menu-btn"
          style="margin-top: 20px"
          onclick="closeGameSettings()"
        >
          BACK
        </button>
      </div>

      <!-- Screen 9: Difficulty Change Warning -->
      <div id="diffChangeWarning" class="screen">
        <h2>CHANGING DIFFICULTY<br />WILL RESTART THE GAME!</h2>
        <p>Your current progress will be lost.</p>
        <div class="prompt-buttons">
          <button class="menu-btn warn-btn" onclick="confirmDiffChange()">
            CHANGE
          </button>
          <button class="menu-btn safe-btn" onclick="cancelDiffChange()">
            CANCEL
          </button>
        </div>
      </div>

      <!-- Screen 10: Pause Screen -->
      <div id="pauseScreen" class="screen">
        <h2>PAUSED</h2>
        <button class="menu-btn" onclick="resumeGame()">RESUME</button>
        <button class="menu-btn" onclick="showScreen('settingsGame')">
          SETTINGS
        </button>
        <button class="menu-btn warn-btn" onclick="showScreen('confirmLeave')">
          LEAVE GAME
        </button>
      </div>

      <!-- Screen 11: Confirm Leave -->
      <div id="confirmLeave" class="screen">
        <h2>ARE YOU SURE?</h2>
        <p>Your progress will be lost!</p>
        <div class="prompt-buttons">
          <button class="menu-btn warn-btn" onclick="leaveGame()">
            YES, LEAVE
          </button>
          <button class="menu-btn safe-btn" onclick="showScreen('pauseScreen')">
            CANCEL
          </button>
        </div>
      </div>

      <!-- Screen 12: Game Over -->
      <div id="gameOverScreen" class="screen">
        <h2>GAME OVER</h2>
        <p class="go-stats">SCORE: <span id="finalScore">0</span></p>
        <p class="go-stats">ROUND: <span id="finalRound">0</span></p>
        <button class="menu-btn" onclick="restartGame()">PLAY AGAIN</button>
        <button class="menu-btn" onclick="leaveGame()">MAIN MENU</button>
      </div>
    </div>

    <script>
      // ==================== GAME STATE ====================
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      const settings = {
        sfxVolume: 70,
        musicVolume: 50,
        difficulty: "medium",
      };

      const diffConfig = {
        easy: {
          lives: 7,
          ballSpeed: 1.5,
          maxBalls: 3,
          ballsPerRound: 1,
          ammo: 10,
        },
        medium: {
          lives: 5,
          ballSpeed: 2.5,
          maxBalls: 5,
          ballsPerRound: 2,
          ammo: 8,
        },
        hard: {
          lives: 3,
          ballSpeed: 3.5,
          maxBalls: 7,
          ballsPerRound: 3,
          ammo: 6,
        },
      };

      let gameLoopStarted = false;

      let game = {
        running: false,
        paused: false,
        score: 0,
        round: 0,
        lives: 5,
        maxLives: 5,
        ammo: 8,
        maxAmmo: 8,
        reloading: false,
        reloadTimer: 0,
        reloadDuration: 60,
        invincible: false,
        invincibleTimer: 0,
      };

      // In-game tutorial state
      let tutorial = {
        active: false,
        step: 0,
        phase: "intro", // "intro" = showing instruction, "play" = waiting for action, "done" = step complete
        aimed: false,
        shot: false,
        hitBall: false,
        reloaded: false,
        msgTimer: 0,
        flashTimer: 0,
      };

      const tutorialSteps = [
        {
          title: "STAP 1: RICHTEN",
          msg: "Gebruik \u2191 en \u2193 om je wapen\nomhoog en omlaag te richten.",
          hint: "Probeer nu te richten!",
          waitFor: "aim",
          successMsg: "Goed zo!",
        },
        {
          title: "STAP 2: SCHIETEN",
          msg: "Druk op SPATIE om te schieten.\nJe kogels kaatsen tegen muren!",
          hint: "Schiet nu!",
          waitFor: "shoot",
          successMsg: "Mooi schot!",
        },
        {
          title: "STAP 3: RAAK DE BAL",
          msg: "Richt op de bal en schiet\nom hem te vernietigen.",
          hint: "Raak de bal!",
          waitFor: "hit",
          successMsg: "Raak!",
        },
        {
          title: "STAP 4: HERLADEN",
          msg: "Druk op R om handmatig\nte herladen.",
          hint: "Druk nu op R!",
          waitFor: "reload",
          successMsg: "Perfect!",
        },
      ];

      let cowboy = {
        x: 60,
        y: 530, // fixed bottom-left position
        width: 50,
        height: 90,
        speed: 0,
        movingUp: false,
        movingDown: false,
        aimAngle: 0,
        aimSpeed: 0.035,
        aimUp: false,
        aimDown: false,
      };

      let mouse = { x: 600, y: 350 };
      let bullets = [];
      let balls = [];
      let particles = [];
      let screenShake = 0;

      // ==================== AUDIO (Web Audio API) ====================
      let audioCtx = null;
      function ensureAudio() {
        if (!audioCtx)
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }

      function playSound(type) {
        ensureAudio();
        const vol = settings.sfxVolume / 100;
        if (vol === 0) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const t = audioCtx.currentTime;

        if (type === "shoot") {
          osc.type = "sawtooth";
          osc.frequency.setValueAtTime(800, t);
          osc.frequency.exponentialRampToValueAtTime(200, t + 0.1);
          gain.gain.setValueAtTime(0.15 * vol, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
          osc.start(t);
          osc.stop(t + 0.15);
        } else if (type === "ricochet") {
          osc.type = "sine";
          osc.frequency.setValueAtTime(1200, t);
          osc.frequency.exponentialRampToValueAtTime(2000, t + 0.08);
          gain.gain.setValueAtTime(0.08 * vol, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
          osc.start(t);
          osc.stop(t + 0.1);
        } else if (type === "hit") {
          osc.type = "square";
          osc.frequency.setValueAtTime(300, t);
          osc.frequency.exponentialRampToValueAtTime(80, t + 0.2);
          gain.gain.setValueAtTime(0.2 * vol, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
          osc.start(t);
          osc.stop(t + 0.25);
        } else if (type === "hurt") {
          osc.type = "sawtooth";
          osc.frequency.setValueAtTime(200, t);
          osc.frequency.exponentialRampToValueAtTime(60, t + 0.4);
          gain.gain.setValueAtTime(0.2 * vol, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
          osc.start(t);
          osc.stop(t + 0.4);
        } else if (type === "reload") {
          osc.type = "triangle";
          osc.frequency.setValueAtTime(400, t);
          osc.frequency.setValueAtTime(600, t + 0.1);
          osc.frequency.setValueAtTime(800, t + 0.2);
          gain.gain.setValueAtTime(0.1 * vol, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
          osc.start(t);
          osc.stop(t + 0.3);
        } else if (type === "gameover") {
          osc.type = "sawtooth";
          osc.frequency.setValueAtTime(400, t);
          osc.frequency.exponentialRampToValueAtTime(50, t + 1.0);
          gain.gain.setValueAtTime(0.2 * vol, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
          osc.start(t);
          osc.stop(t + 1.0);
        } else if (type === "roundclear") {
          osc.type = "sine";
          osc.frequency.setValueAtTime(523, t);
          osc.frequency.setValueAtTime(659, t + 0.15);
          osc.frequency.setValueAtTime(784, t + 0.3);
          gain.gain.setValueAtTime(0.15 * vol, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
          osc.start(t);
          osc.stop(t + 0.5);
        } else if (type === "empty") {
          osc.type = "triangle";
          osc.frequency.setValueAtTime(150, t);
          gain.gain.setValueAtTime(0.06 * vol, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
          osc.start(t);
          osc.stop(t + 0.08);
        }
      }

      // ==================== SCREEN MANAGEMENT ====================
      let previousScreen = "mainMenu";
      let pendingDifficulty = null;

      function showScreen(id) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        const screen = document.getElementById(id);
        if (screen) screen.classList.add("active");

        // Show/hide canvas
        if (
          id === "gameOverScreen" ||
          id === "pauseScreen" ||
          id === "settingsGame" ||
          id === "confirmLeave" ||
          id === "diffChangeWarning"
        ) {
          canvas.style.display = "block";
        } else if (game.running) {
          canvas.style.display = "block";
        } else {
          canvas.style.display = "none";
        }
      }

      function setDifficulty(diff) {
        settings.difficulty = diff;
        updateDiffDisplays();
        showScreen("tutorialPrompt");
      }

      function updateDiffDisplays() {
        const label = settings.difficulty.toUpperCase();
        document.getElementById("diffDisplayMain").textContent = label;
        document.getElementById("diffDisplayGame").textContent = label;
      }

      function cycleDifficulty() {
        const order = ["easy", "medium", "hard"];
        const idx = order.indexOf(settings.difficulty);
        settings.difficulty = order[(idx + 1) % 3];
        updateDiffDisplays();
      }

      function tryChangeDifficulty() {
        const order = ["easy", "medium", "hard"];
        const idx = order.indexOf(settings.difficulty);
        pendingDifficulty = order[(idx + 1) % 3];
        showScreen("diffChangeWarning");
      }

      function confirmDiffChange() {
        if (pendingDifficulty) {
          settings.difficulty = pendingDifficulty;
          updateDiffDisplays();
          pendingDifficulty = null;
        }
        startGame();
      }

      function cancelDiffChange() {
        pendingDifficulty = null;
        showScreen("settingsGame");
      }

      function updateSetting(type, value) {
        if (type === "sfx") {
          settings.sfxVolume = parseInt(value);
          document.getElementById("sfxValMain").textContent = value;
          document.getElementById("sfxValGame").textContent = value;
          document.getElementById("sfxVolumeMain").value = value;
          document.getElementById("sfxVolumeGame").value = value;
        } else if (type === "music") {
          settings.musicVolume = parseInt(value);
          document.getElementById("musicValMain").textContent = value;
          document.getElementById("musicValGame").textContent = value;
          document.getElementById("musicVolumeMain").value = value;
          document.getElementById("musicVolumeGame").value = value;
        }
      }

      function closeGameSettings() {
        showScreen("pauseScreen");
      }

      // ==================== GAME LOGIC ====================
      function startGame() {
        const cfg = diffConfig[settings.difficulty];
        game = {
          running: true,
          paused: false,
          score: 0,
          round: 0,
          lives: cfg.lives,
          maxLives: cfg.lives,
          ammo: cfg.ammo,
          maxAmmo: cfg.ammo,
          reloading: false,
          reloadTimer: 0,
          reloadDuration: 60,
          invincible: false,
          invincibleTimer: 0,
        };
        cowboy.y = canvas.height - 90 - cowboy.height / 2; // bottom-left
        cowboy.movingUp = false;
        cowboy.movingDown = false;
        bullets = [];
        balls = [];
        particles = [];
        screenShake = 0;

        canvas.style.display = "block";
        showScreen(null);
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));

        // Remove focus from any menu button so keyboard events work
        document.activeElement.blur();
        canvas.focus();

        if (!tutorial.active) {
          nextRound();
        } else {
          // Spawn one slow ball for the tutorial
          spawnTutorialBall();
        }
        if (!gameLoopStarted) {
          gameLoopStarted = true;
          gameLoop();
        }
      }

      function startTutorial() {
        tutorial = {
          active: true,
          step: 0,
          phase: "intro",
          aimed: false,
          shot: false,
          hitBall: false,
          reloaded: false,
          msgTimer: 0,
          flashTimer: 0,
        };
        startGame();
      }

      function spawnTutorialBall() {
        // Spawn a single slow-moving ball for practice
        balls.push({
          x: 900,
          y: 300,
          radius: 30,
          size: 2,
          vx: -0.5,
          vy: 0.3,
          color: "#e94560",
          hit: false,
        });
      }

      function completeTutorialStep() {
        // Show success, then move to "done" phase
        tutorial.phase = "done";
        tutorial.msgTimer = 0;
      }

      function advanceTutorial() {
        tutorial.step++;
        tutorial.msgTimer = 0;
        tutorial.flashTimer = 0;
        if (tutorial.step >= tutorialSteps.length) {
          // All steps done, show exit screen
          tutorial.phase = "exit";
          balls = [];
          bullets = [];
          particles = [];
          return;
        }
        tutorial.phase = "intro";
      }

      function finishTutorial() {
        // Tutorial done, start real game
        tutorial.active = false;
        tutorial.phase = "";
        game.score = 0;
        game.round = 0;
        game.lives = diffConfig[settings.difficulty].lives;
        game.ammo = diffConfig[settings.difficulty].ammo;
        game.maxAmmo = diffConfig[settings.difficulty].ammo;
        game.reloading = false;
        game.reloadTimer = 0;
        balls = [];
        bullets = [];
        particles = [];
        nextRound();
      }

      function updateTutorial() {
        if (!tutorial.active) return;
        tutorial.flashTimer++;

        if (tutorial.phase === "intro") {
          // Waiting for any key press
          return;
        }

        if (tutorial.phase === "done") {
          // Waiting for any key press
          return;
        }

        if (tutorial.phase === "exit") {
          // Waiting for SPACE to start real game
          return;
        }

        if (tutorial.phase !== "play") return;

        const step = tutorialSteps[tutorial.step];
        if (step.waitFor === "aim" && tutorial.aimed) {
          completeTutorialStep();
        } else if (step.waitFor === "shoot" && tutorial.shot) {
          completeTutorialStep();
        } else if (step.waitFor === "hit" && tutorial.hitBall) {
          completeTutorialStep();
        } else if (step.waitFor === "reload" && tutorial.reloaded) {
          completeTutorialStep();
        }
      }

      function drawTutorialOverlay() {
        if (!tutorial.active) return;
        const cx = canvas.width / 2;

        ctx.save();

        // Exit screen - tutorial complete
        if (tutorial.phase === "exit") {
          // Full screen dark overlay
          ctx.fillStyle = "rgba(10, 10, 26, 0.85)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          // Big box
          const boxW = 600;
          const boxH = 220;
          const boxX = (canvas.width - boxW) / 2;
          const boxY = (canvas.height - boxH) / 2 - 30;

          ctx.fillStyle = "rgba(15, 52, 96, 0.95)";
          ctx.strokeStyle = "#c4a35a";
          ctx.lineWidth = 3;
          roundRect(ctx, boxX, boxY, boxW, boxH, 12);
          ctx.fill();
          ctx.stroke();

          ctx.textAlign = "center";
          ctx.fillStyle = "#4ecdc4";
          ctx.font = '24px "Press Start 2P"';
          ctx.fillText("TUTORIAL KLAAR!", cx, boxY + 60);

          ctx.fillStyle = "#a0c4e8";
          ctx.font = '12px "Press Start 2P"';
          ctx.fillText("Je kent nu alle besturing.", cx, boxY + 110);
          ctx.fillText("Veel succes, cowboy!", cx, boxY + 140);

          // Blinking prompt
          if (Math.floor(tutorial.flashTimer / 30) % 2 === 0) {
            ctx.fillStyle = "#f0e68c";
            ctx.font = '14px "Press Start 2P"';
            ctx.fillText("Druk op SPATIE om te beginnen", cx, boxY + 190);
          }

          ctx.textAlign = "left";
          ctx.restore();
          return;
        }

        if (tutorial.step >= tutorialSteps.length) { ctx.restore(); return; }
        const step = tutorialSteps[tutorial.step];

        if (tutorial.phase === "intro") {
          // Dark overlay with step introduction
          ctx.fillStyle = "rgba(10, 10, 26, 0.75)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          const boxW = 550;
          const boxH = 180;
          const boxX = (canvas.width - boxW) / 2;
          const boxY = (canvas.height - boxH) / 2 - 20;

          ctx.fillStyle = "rgba(15, 52, 96, 0.95)";
          ctx.strokeStyle = "#c4a35a";
          ctx.lineWidth = 3;
          roundRect(ctx, boxX, boxY, boxW, boxH, 12);
          ctx.fill();
          ctx.stroke();

          // Step counter
          ctx.textAlign = "center";
          ctx.fillStyle = "#c4a35a";
          ctx.font = '10px "Press Start 2P"';
          ctx.fillText((tutorial.step + 1) + " / " + tutorialSteps.length, cx, boxY + 30);

          // Title
          ctx.fillStyle = "#f0e68c";
          ctx.font = '20px "Press Start 2P"';
          ctx.fillText(step.title, cx, boxY + 70);

          // Description (multiline)
          ctx.fillStyle = "#a0c4e8";
          ctx.font = '12px "Press Start 2P"';
          const lines = step.msg.split("\n");
          for (let i = 0; i < lines.length; i++) {
            ctx.fillText(lines[i], cx, boxY + 110 + i * 24);
          }

          // Blinking "press any key" hint
          if (Math.floor(tutorial.flashTimer / 30) % 2 === 0) {
            ctx.fillStyle = "#f0e68c";
            ctx.font = '10px "Press Start 2P"';
            ctx.fillText("Druk op een toets om verder te gaan", cx, boxY + 170);
          }

          ctx.textAlign = "left";
          ctx.restore();
          return;
        }

        if (tutorial.phase === "play") {
          // Small hint bar at top during gameplay
          const boxW = 500;
          const boxH = 50;
          const boxX = (canvas.width - boxW) / 2;
          const boxY = 60;

          ctx.fillStyle = "rgba(15, 52, 96, 0.9)";
          ctx.strokeStyle = "#c4a35a";
          ctx.lineWidth = 2;
          roundRect(ctx, boxX, boxY, boxW, boxH, 8);
          ctx.fill();
          ctx.stroke();

          // Step indicator
          ctx.fillStyle = "#c4a35a";
          ctx.font = '8px "Press Start 2P"';
          ctx.textAlign = "center";
          ctx.fillText(step.title, cx, boxY + 18);

          // Blinking hint text
          if (Math.floor(tutorial.flashTimer / 20) % 2 === 0) {
            ctx.fillStyle = "#f0e68c";
          } else {
            ctx.fillStyle = "#ffffff";
          }
          ctx.font = '12px "Press Start 2P"';
          ctx.fillText(step.hint, cx, boxY + 40);

          ctx.textAlign = "left";
          ctx.restore();
          return;
        }

        if (tutorial.phase === "done") {
          // Success message
          const boxW = 400;
          const boxH = 90;
          const boxX = (canvas.width - boxW) / 2;
          const boxY = 70;

          ctx.fillStyle = "rgba(30, 120, 80, 0.9)";
          ctx.strokeStyle = "#4ecdc4";
          ctx.lineWidth = 2;
          roundRect(ctx, boxX, boxY, boxW, boxH, 8);
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = "#4ecdc4";
          ctx.font = '18px "Press Start 2P"';
          ctx.textAlign = "center";
          ctx.fillText(step.successMsg, cx, boxY + 35);

          // Blinking hint
          if (Math.floor(tutorial.flashTimer / 30) % 2 === 0) {
            ctx.fillStyle = "#ffffffaa";
            ctx.font = '10px "Press Start 2P"';
            ctx.fillText("Druk op een toets", cx, boxY + 70);
          }

          ctx.textAlign = "left";
          ctx.restore();
          return;
        }

        ctx.restore();
      }

      function nextRound() {
        game.round++;
        const cfg = diffConfig[settings.difficulty];
        const count = Math.min(
          cfg.ballsPerRound + Math.floor((game.round - 1) / 2),
          cfg.maxBalls,
        );
        for (let i = 0; i < count; i++) {
          const sizes = [2, 3];
          const size = sizes[Math.floor(Math.random() * sizes.length)];
          spawnBall(size);
        }
        playSound("roundclear");
      }

      function spawnBall(size, atX, atY) {
        const cfg = diffConfig[settings.difficulty];
        const radius = size * 15;
        // Spawn from right side of screen
        const x = atX !== undefined ? atX : 800 + Math.random() * 350;
        const y = atY !== undefined ? atY : 80 + Math.random() * 440;
        // Move mostly toward the left so they approach the cowboy
        const angle = Math.PI + (Math.random() - 0.5) * 1.2;
        const speed = cfg.ballSpeed * (0.8 + Math.random() * 0.4) * (3 / size);
        balls.push({
          x,
          y,
          radius,
          size,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          color: size === 3 ? "#4ecdc4" : size === 2 ? "#e94560" : "#f0e68c",
          hit: false,
        });
      }

      function shoot() {
        if (game.reloading || game.ammo <= 0) {
          playSound("empty");
          return;
        }
        tutorial.shot = true;
        game.ammo--;
        if (game.ammo <= 0) {
          reload();
        }
        const angle = cowboy.aimAngle;
        const gunX = cowboy.x + 40;
        const gunY = cowboy.y - 15;
        bullets.push({
          x: gunX,
          y: gunY,
          vx: Math.cos(angle) * 10,
          vy: Math.sin(angle) * 10,
          bounces: 0,
          maxBounces: 3,
          life: 180,
        });
        playSound("shoot");
        screenShake = 3;
      }

      function reload(manual) {
        if (game.reloading || game.ammo === game.maxAmmo) return;
        if (manual) tutorial.reloaded = true;
        game.reloading = true;
        game.reloadTimer = game.reloadDuration;
        playSound("reload");
      }

      function resumeGame() {
        game.paused = false;
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
      }

      function pauseGame() {
        game.paused = true;
        showScreen("pauseScreen");
      }

      function leaveGame() {
        game.running = false;
        game.paused = false;
        canvas.style.display = "none";
        showScreen("mainMenu");
      }

      function restartGame() {
        startGame();
      }

      function gameOver() {
        game.running = false;
        game.paused = false;
        playSound("gameover");
        document.getElementById("finalScore").textContent = game.score;
        document.getElementById("finalRound").textContent = game.round;
        showScreen("gameOverScreen");
      }

      // ==================== PARTICLES ====================
      function spawnParticles(x, y, color, count) {
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 1 + Math.random() * 4;
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 20 + Math.random() * 20,
            maxLife: 40,
            radius: 2 + Math.random() * 3,
            color,
          });
        }
      }

      // ==================== UPDATE ====================
      function update() {
        if (!game.running || game.paused) return;

        // Cowboy is fixed at bottom-left, no movement

        // Tutorial update
        updateTutorial();

        // Aim angle (arrow keys up/down)
        if (cowboy.aimUp) { cowboy.aimAngle -= cowboy.aimSpeed; tutorial.aimed = true; }
        if (cowboy.aimDown) { cowboy.aimAngle += cowboy.aimSpeed; tutorial.aimed = true; }
        // Clamp aim angle: -80deg to +80deg (roughly forward-facing)
        cowboy.aimAngle = Math.max(
          -Math.PI * 0.44,
          Math.min(Math.PI * 0.44, cowboy.aimAngle),
        );

        // Reload
        if (game.reloading) {
          game.reloadTimer--;
          if (game.reloadTimer <= 0) {
            game.reloading = false;
            game.ammo = game.maxAmmo;
          }
        }

        // Invincibility
        if (game.invincible) {
          game.invincibleTimer--;
          if (game.invincibleTimer <= 0) game.invincible = false;
        }

        // Screen shake decay
        if (screenShake > 0) screenShake *= 0.85;
        if (screenShake < 0.1) screenShake = 0;

        // Update bullets
        for (let i = bullets.length - 1; i >= 0; i--) {
          const b = bullets[i];
          b.x += b.vx;
          b.y += b.vy;
          b.life--;

          // Wall bouncing
          if (b.y <= 0 || b.y >= canvas.height - 80) {
            b.vy *= -1;
            b.bounces++;
            b.y = b.y <= 0 ? 1 : canvas.height - 81;
            playSound("ricochet");
            spawnParticles(b.x, b.y, "#f0e68c", 3);
          }
          if (b.x >= canvas.width) {
            b.vx *= -1;
            b.bounces++;
            b.x = canvas.width - 1;
            playSound("ricochet");
            spawnParticles(b.x, b.y, "#f0e68c", 3);
          }
          if (b.x <= 0) {
            b.vx *= -1;
            b.bounces++;
            b.x = 1;
            playSound("ricochet");
            spawnParticles(b.x, b.y, "#f0e68c", 3);
          }

          if (b.bounces > b.maxBounces || b.life <= 0) {
            bullets.splice(i, 1);
            continue;
          }

          // Bullet-ball collision
          for (let j = balls.length - 1; j >= 0; j--) {
            const ball = balls[j];
            const dx = b.x - ball.x;
            const dy = b.y - ball.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < ball.radius + 3) {
              // Hit!
              bullets.splice(i, 1);
              spawnParticles(ball.x, ball.y, ball.color, 12);
              playSound("hit");
              screenShake = 6;
              game.score += ball.size * 100;
              tutorial.hitBall = true;

              balls.splice(j, 1);
              break;
            }
          }
        }

        // Update balls (freeze during tutorial popups)
        const groundY = canvas.height - 80;
        const tutorialFrozen = tutorial.active && tutorial.phase !== "play";
        for (let i = balls.length - 1; i >= 0; i--) {
          if (tutorialFrozen) continue;
          const ball = balls[i];
          ball.x += ball.vx;
          ball.y += ball.vy;
          ball.vy += 0.03; // slight gravity

          // Bounce off top, right, and bottom walls (NOT left wall)
          if (ball.x + ball.radius >= canvas.width) {
            ball.x = canvas.width - ball.radius;
            ball.vx = -Math.abs(ball.vx);
          }
          if (ball.y - ball.radius <= 0) {
            ball.y = ball.radius;
            ball.vy = Math.abs(ball.vy);
          }
          if (ball.y + ball.radius >= groundY) {
            ball.y = groundY - ball.radius;
            ball.vy = -Math.abs(ball.vy) * 0.95;
          }

          // Ball-cowboy collision: ball hits or passes the cowboy -> lose a life and remove ball
          const cx = cowboy.x + 20;
          const cy = cowboy.y - cowboy.height / 4;
          const dx = ball.x - cx;
          const dy = ball.y - cy;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const hitCowboy = dist < ball.radius + 25;
          const passedCowboy = ball.x - ball.radius <= 0;

          if (hitCowboy || passedCowboy) {
            // Remove the ball
            balls.splice(i, 1);

            if (tutorial.active) {
              // No damage during tutorial, just respawn
              continue;
            }

            if (!game.invincible) {
              game.lives--;
              game.invincible = true;
              game.invincibleTimer = 90;
              playSound("hurt");
              screenShake = 10;
              spawnParticles(cx, cy, "#e94560", 8);
              if (game.lives <= 0) {
                gameOver();
                return;
              }
            }
          }
        }

        // Check round clear (not during tutorial)
        if (balls.length === 0 && game.running && !tutorial.active) {
          nextRound();
        }
        // During tutorial, respawn ball if it goes off screen
        if (tutorial.active && balls.length === 0 && tutorial.step <= 2) {
          spawnTutorialBall();
        }

        // Update particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vx *= 0.96;
          p.vy *= 0.96;
          p.life--;
          if (p.life <= 0) particles.splice(i, 1);
        }
      }

      // ==================== DRAW ====================
      function drawCowboy() {
        const x = cowboy.x;
        const y = cowboy.y;
        const flash =
          game.invincible && Math.floor(game.invincibleTimer / 4) % 2 === 0;

        ctx.save();
        if (flash) ctx.globalAlpha = 0.4;

        const skinColor = "#f5d0a9";
        const outlineColor = "#1a1a2e";
        const hatColor = "#8B4513";
        const hatBand = "#c4a35a";
        const shirtColor = "#a0522d";
        const pantsColor = "#4a6fa5";
        const beltColor = "#2a2a2a";
        const bootColor = "#3d2b1f";

        // Legs
        ctx.strokeStyle = outlineColor;
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(x + 12, y + 15);
        ctx.lineTo(x + 6, y + 40);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x + 28, y + 15);
        ctx.lineTo(x + 34, y + 40);
        ctx.stroke();

        // Pants
        ctx.strokeStyle = pantsColor;
        ctx.lineWidth = 7;
        ctx.beginPath();
        ctx.moveTo(x + 12, y + 10);
        ctx.lineTo(x + 6, y + 36);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x + 28, y + 10);
        ctx.lineTo(x + 34, y + 36);
        ctx.stroke();

        // Boots
        ctx.fillStyle = bootColor;
        ctx.fillRect(x + 1, y + 35, 12, 8);
        ctx.fillRect(x + 28, y + 35, 12, 8);
        // Boot heels
        ctx.fillStyle = "#2a1a0f";
        ctx.fillRect(x + 1, y + 40, 4, 3);
        ctx.fillRect(x + 36, y + 40, 4, 3);

        // Body / Shirt
        ctx.fillStyle = shirtColor;
        ctx.fillRect(x + 5, y - 20, 30, 35);
        // Shirt details - buttons
        ctx.fillStyle = hatBand;
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.arc(x + 20, y - 12 + i * 8, 1.5, 0, Math.PI * 2);
          ctx.fill();
        }

        // Belt
        ctx.fillStyle = beltColor;
        ctx.fillRect(x + 5, y + 8, 30, 5);
        // Belt buckle
        ctx.fillStyle = "#c4a35a";
        ctx.fillRect(x + 16, y + 8, 8, 5);

        // Neck
        ctx.fillStyle = skinColor;
        ctx.fillRect(x + 15, y - 25, 10, 8);

        // Head
        ctx.fillStyle = skinColor;
        ctx.beginPath();
        ctx.arc(x + 20, y - 35, 13, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = outlineColor;
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Eyes
        ctx.fillStyle = outlineColor;
        ctx.beginPath();
        ctx.arc(x + 16, y - 37, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + 25, y - 37, 2, 0, Math.PI * 2);
        ctx.fill();

        // Mouth
        ctx.strokeStyle = outlineColor;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(x + 20, y - 30, 4, 0.1, Math.PI - 0.1);
        ctx.stroke();

        // Cowboy hat
        ctx.fillStyle = hatColor;
        // Hat brim
        ctx.beginPath();
        ctx.ellipse(x + 20, y - 46, 22, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = outlineColor;
        ctx.lineWidth = 1;
        ctx.stroke();
        // Hat top
        ctx.fillStyle = hatColor;
        ctx.beginPath();
        ctx.moveTo(x + 8, y - 47);
        ctx.lineTo(x + 10, y - 60);
        ctx.lineTo(x + 30, y - 60);
        ctx.lineTo(x + 32, y - 47);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        // Hat band
        ctx.fillStyle = hatBand;
        ctx.fillRect(x + 8, y - 50, 24, 4);

        // Gun arm (aim direction)
        const gunX = x + 40;
        const gunY = y - 15;
        const angle = cowboy.aimAngle;

        // Arm
        ctx.strokeStyle = shirtColor;
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(x + 33, y - 12);
        ctx.lineTo(gunX, gunY);
        ctx.stroke();

        // Hand
        ctx.fillStyle = skinColor;
        ctx.beginPath();
        ctx.arc(gunX, gunY, 4, 0, Math.PI * 2);
        ctx.fill();

        // Gun
        ctx.save();
        ctx.translate(gunX, gunY);
        ctx.rotate(angle);
        ctx.fillStyle = "#333";
        ctx.fillRect(0, -3, 22, 6);
        // Gun barrel end
        ctx.fillStyle = "#555";
        ctx.fillRect(18, -4, 6, 8);
        // Gun handle
        ctx.fillStyle = "#5a3a1a";
        ctx.fillRect(-2, 3, 8, 10);
        ctx.restore();

        // Other arm (resting)
        ctx.strokeStyle = shirtColor;
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(x + 7, y - 12);
        ctx.lineTo(x - 3, y);
        ctx.stroke();
        ctx.fillStyle = skinColor;
        ctx.beginPath();
        ctx.arc(x - 3, y, 3.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      function drawBall(ball) {
        ctx.save();
        // Glow
        const gradient = ctx.createRadialGradient(
          ball.x,
          ball.y,
          0,
          ball.x,
          ball.y,
          ball.radius * 1.3,
        );
        gradient.addColorStop(0, ball.color + "66");
        gradient.addColorStop(1, "transparent");
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius * 1.3, 0, Math.PI * 2);
        ctx.fill();

        // Ball
        ctx.fillStyle = ball.color;
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fill();

        // Highlight
        ctx.fillStyle = "rgba(255,255,255,0.3)";
        ctx.beginPath();
        ctx.arc(
          ball.x - ball.radius * 0.3,
          ball.y - ball.radius * 0.3,
          ball.radius * 0.4,
          0,
          Math.PI * 2,
        );
        ctx.fill();

        // Outline
        ctx.strokeStyle = "#fff3";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      function drawBullet(b) {
        ctx.save();
        // Glow
        ctx.shadowColor = "#ffcc00";
        ctx.shadowBlur = 12;

        // Trail
        ctx.strokeStyle = "#ffd700cc";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(b.x, b.y);
        ctx.lineTo(b.x - b.vx * 4, b.y - b.vy * 4);
        ctx.stroke();

        // Bullet
        ctx.fillStyle = "#ffee00";
        ctx.beginPath();
        ctx.arc(b.x, b.y, 6, 0, Math.PI * 2);
        ctx.fill();

        // Bright core
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(b.x, b.y, 2.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      function drawHUD() {
        const hudY = 10;

        // Lives - background panel
        ctx.fillStyle = "#0f3460cc";
        ctx.strokeStyle = "#1a6b6a";
        ctx.lineWidth = 2;
        roundRect(ctx, 15, hudY, 30 + game.maxLives * 28, 40, 6);
        ctx.fill();
        ctx.stroke();

        // Hearts
        for (let i = 0; i < game.maxLives; i++) {
          const hx = 28 + i * 28;
          const hy = hudY + 20;
          drawHeart(hx, hy, i < game.lives ? "#e94560" : "#333");
        }

        // Ammo - background panel
        ctx.fillStyle = "#0f3460cc";
        ctx.strokeStyle = "#1a6b6a";
        roundRect(ctx, 15, hudY + 45, 30 + game.maxAmmo * 22, 32, 6);
        ctx.fill();
        ctx.stroke();

        // Ammo icons
        for (let i = 0; i < game.maxAmmo; i++) {
          const ax = 26 + i * 22;
          const ay = hudY + 53;
          ctx.fillStyle = i < game.ammo ? "#c4a35a" : "#333";
          ctx.fillRect(ax, ay, 6, 16);
          ctx.fillStyle = i < game.ammo ? "#daa520" : "#444";
          ctx.fillRect(ax - 1, ay, 8, 5);
        }

        // Reload indicator
        if (game.reloading) {
          const pct = 1 - game.reloadTimer / game.reloadDuration;
          ctx.fillStyle = "#0f3460cc";
          ctx.strokeStyle = "#c4a35a";
          roundRect(ctx, 15, hudY + 82, 160, 20, 4);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#c4a35a";
          ctx.fillRect(18, hudY + 85, 154 * pct, 14);
          ctx.fillStyle = "#fff";
          ctx.font = '8px "Press Start 2P"';
          ctx.fillText("RELOADING...", 30, hudY + 96);
        }

        // Round counter
        ctx.fillStyle = "#0f3460cc";
        ctx.strokeStyle = "#1a6b6a";
        roundRect(ctx, 460, hudY, 200, 40, 6);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#fff";
        ctx.font = '16px "Press Start 2P"';
        ctx.textAlign = "center";
        ctx.fillText("ROUND: " + game.round, 560, hudY + 27);

        // Score
        ctx.fillStyle = "#0f3460cc";
        ctx.strokeStyle = "#1a6b6a";
        roundRect(ctx, 780, hudY, 220, 40, 6);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#fff";
        ctx.fillText("SCORE: " + game.score, 890, hudY + 27);

        // Pause button
        ctx.fillStyle = "#0f3460cc";
        ctx.strokeStyle = "#e94560";
        ctx.lineWidth = 2;
        roundRect(ctx, 1130, hudY, 55, 40, 6);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#e94560";
        ctx.fillRect(1144, hudY + 10, 8, 20);
        ctx.fillRect(1158, hudY + 10, 8, 20);

        ctx.textAlign = "left";

        // Bottom bar
        const barY = canvas.height - 80;
        ctx.fillStyle = "#1a8a5a";
        ctx.fillRect(0, barY, canvas.width, 80);
        ctx.fillStyle = "#15704a";
        ctx.fillRect(0, barY, canvas.width, 4);

        // Control hints
        ctx.font = '10px "Press Start 2P"';
        ctx.textAlign = "center";

        // W/S Move
        ctx.fillStyle = "#0f3460";
        ctx.strokeStyle = "#1a6b6a";
        roundRect(ctx, 140, barY + 12, 120, 22, 4);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#f0e68c";
        ctx.fillText("W/S MOVE", 200, barY + 28);

        // Arrow keys Aim
        ctx.fillStyle = "#0f3460";
        roundRect(ctx, 280, barY + 12, 140, 22, 4);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#f0e68c";
        ctx.fillText("\u2191/\u2193 AIM", 350, barY + 28);

        // SPACE Shoot
        ctx.fillStyle = "#0f3460";
        roundRect(ctx, 440, barY + 12, 160, 22, 4);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#f0e68c";
        ctx.fillText("SPACE SHOOT", 520, barY + 28);

        // R Reload
        ctx.fillStyle = "#0f3460";
        roundRect(ctx, 620, barY + 12, 130, 22, 4);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#f0e68c";
        ctx.fillText("R RELOAD", 685, barY + 28);

        // Aim angle indicator
        ctx.fillStyle = "#0f3460";
        roundRect(ctx, 140, barY + 42, 610, 24, 4);
        ctx.fill();
        // Aim bar: map angle from -0.44pi..+0.44pi to 0..1
        const aimNorm = (cowboy.aimAngle + Math.PI * 0.44) / (Math.PI * 0.88);
        const aimBarW = 600;
        ctx.fillStyle = "#c4a35a";
        // Draw center marker
        ctx.fillStyle = "#1a6b6a55";
        ctx.fillRect(140 + 5 + aimBarW * 0.5 - 1, barY + 45, 2, 18);
        // Draw aim position
        ctx.fillStyle = "#c4a35a";
        const aimX = 140 + 5 + aimBarW * aimNorm;
        ctx.fillRect(aimX - 4, barY + 45, 8, 18);

        ctx.textAlign = "left";
      }

      function drawHeart(x, y, color) {
        ctx.save();
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(x, y + 4);
        ctx.bezierCurveTo(x, y, x - 8, y - 4, x - 8, y + 2);
        ctx.bezierCurveTo(x - 8, y + 8, x, y + 14, x, y + 14);
        ctx.bezierCurveTo(x, y + 14, x + 8, y + 8, x + 8, y + 2);
        ctx.bezierCurveTo(x + 8, y - 4, x, y, x, y + 4);
        ctx.fill();
        ctx.restore();
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }

      function drawAimLine() {
        const gunX = cowboy.x + 40;
        const gunY = cowboy.y - 15;
        const angle = cowboy.aimAngle;

        ctx.save();
        ctx.strokeStyle = "#ff0000cc";
        ctx.lineWidth = 2;
        ctx.setLineDash([10, 6]);
        ctx.beginPath();
        ctx.moveTo(gunX, gunY);

        // Simulate bullet path for aim line
        let px = gunX,
          py = gunY;
        let dvx = Math.cos(angle) * 10;
        let dvy = Math.sin(angle) * 10;
        let bounces = 0;
        for (let step = 0; step < 25 && bounces <= 1; step++) {
          const nx = px + dvx;
          const ny = py + dvy;
          if (ny <= 0 || ny >= canvas.height - 80) {
            dvy *= -1;
            bounces++;
          }
          if (nx >= canvas.width || nx <= 0) {
            dvx *= -1;
            bounces++;
          }
          px += dvx;
          py += dvy;
          ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }

      function draw() {
        ctx.save();

        // Screen shake
        if (screenShake > 0) {
          const sx = (Math.random() - 0.5) * screenShake * 2;
          const sy = (Math.random() - 0.5) * screenShake * 2;
          ctx.translate(sx, sy);
        }

        // Background
        ctx.fillStyle = "#e8e0d0";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Desert background details
        ctx.fillStyle = "#d4c8a8";
        ctx.fillRect(0, canvas.height - 120, canvas.width, 40);

        // Draw aim line
        drawAimLine();

        // Draw balls
        for (const ball of balls) {
          drawBall(ball);
        }

        // Draw bullets
        for (const b of bullets) {
          drawBullet(b);
        }

        // Draw particles
        for (const p of particles) {
          ctx.globalAlpha = p.life / p.maxLife;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;

        // Draw cowboy
        drawCowboy();

        // Draw HUD
        drawHUD();

        // Draw tutorial overlay
        drawTutorialOverlay();

        ctx.restore();
      }

      // ==================== GAME LOOP ====================
      function gameLoop() {
        update();
        if (game.running && !game.paused) {
          draw();
        }
        requestAnimationFrame(gameLoop);
      }

      // ==================== INPUT ====================
      // Controls:
      //   Arrow Up/Down = aim gun up/down
      //   SPACE        = shoot
      //   R            = reload
      //   ESC          = pause

      document.addEventListener("keydown", (e) => {
        // ESC works even when paused
        if (e.key === "Escape") {
          if (!game.running) return;
          if (game.paused) {
            const settingsOpen = document
              .getElementById("settingsGame")
              .classList.contains("active");
            const confirmOpen = document
              .getElementById("confirmLeave")
              .classList.contains("active");
            const diffWarnOpen = document
              .getElementById("diffChangeWarning")
              .classList.contains("active");
            if (settingsOpen || confirmOpen || diffWarnOpen) {
              showScreen("pauseScreen");
            } else {
              resumeGame();
            }
          } else {
            pauseGame();
          }
          e.preventDefault();
          return;
        }

        if (!game.running || game.paused) return;

        // Tutorial exit: SPACE starts real game
        if (tutorial.active && tutorial.phase === "exit") {
          if (e.key === " ") {
            finishTutorial();
            e.preventDefault();
          }
          return;
        }

        // Tutorial intro/done: any key press advances
        if (tutorial.active && tutorial.phase === "intro") {
          tutorial.phase = "play";
          e.preventDefault();
          return;
        }
        if (tutorial.active && tutorial.phase === "done") {
          advanceTutorial();
          e.preventDefault();
          return;
        }

        // Aim (Arrow keys)
        if (e.key === "ArrowUp") {
          cowboy.aimUp = true;
          e.preventDefault();
        }
        if (e.key === "ArrowDown") {
          cowboy.aimDown = true;
          e.preventDefault();
        }

        // Shoot (Space)
        if (e.key === " ") {
          shoot();
          e.preventDefault();
        }

        // Reload (R)
        if (e.key === "r" || e.key === "R") {
          reload(true);
        }
      });

      document.addEventListener("keyup", (e) => {
        if (e.key === "ArrowUp") cowboy.aimUp = false;
        if (e.key === "ArrowDown") cowboy.aimDown = false;
      });

      // Mouse aiming still works as alternative
      canvas.addEventListener("mousemove", (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        mouse.x = (e.clientX - rect.left) * scaleX;
        mouse.y = (e.clientY - rect.top) * scaleY;
      });

      // Click on canvas: pause button or bottom bar only (shooting is via SPACE)
      canvas.addEventListener("click", (e) => {
        if (!game.running) return;

        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const clickX = (e.clientX - rect.left) * scaleX;
        const clickY = (e.clientY - rect.top) * (canvas.height / rect.height);

        // Check if pause button clicked
        if (clickX >= 1130 && clickX <= 1185 && clickY >= 10 && clickY <= 50) {
          pauseGame();
          return;
        }

        // Check bottom bar buttons
        const barY = canvas.height - 80;
        if (clickY >= barY) {
          if (clickX >= 320 && clickX <= 360) {
            reload(true);
            return;
          }
        }
      });

      canvas.addEventListener("contextmenu", (e) => e.preventDefault());

      // ==================== INIT ====================
      updateDiffDisplays();
    </script>
  </body>
</html>
